<body class="bg-[#050707] text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-background dark:bg-background border-b border-outline-variant flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 z-50 transition-all duration-300">
 <a href="index.html" class="flex items-center gap-xs cursor-pointer active:scale-95 transition-transform group">
            <span
                class="material-symbols-outlined text-primary dark:text-primary group-hover:bg-primary-container/10 rounded-full p-1 transition-colors">arrow_back</span>
            <span
                class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-primary transition-colors">Voltar</span>
        </a>
<div class="absolute left-1/2 -translate-x-1/2 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[28px] drop-shadow-[0_0_8px_rgba(102,218,186,0.5)]">calendar_month</span>
</div>
<div class="w-[60px]"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content -->
<main class="flex-grow pt-24 pb-lg px-margin-mobile md:px-margin-desktop max-w-4xl mx-auto w-full flex flex-col items-center">
<!-- Header Text -->
<div class="text-center mb-lg md:mb-xl w-full max-w-2xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background mb-sm tracking-tight text-balance">
                Escolha o Melhor Horário
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant text-balance">
                Selecione uma data na agenda abaixo para batermos um papo sobre a presença digital do seu comércio.
            </p>
</div>
<!-- Booking Widget Container (Simulated Calendly) -->
<div class="w-full bg-surface-container rounded-xl border border-outline-variant shadow-[0_8px_32px_-8px_rgba(0,0,0,0.5)] overflow-hidden relative group">
<!-- Simulated Glow Effect -->
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
<div class="h-[600px] w-full flex items-center justify-center bg-surface-dim relative z-10">
<!-- Início do agendamento de consultas no Google Calendar -->
<iframe src="https://calendar.google.com/calendar/appointments/AcZssZ2EvF9jd96ox6mJTIBYeZ12kfJ1SawQb3WmaJk=?gv=true" class="border-0 w-full h-[600px]" title="Agendamento Google Calendar" frameborder="0"></iframe>
<!-- fim do agendamento de compromissos no Google Calendar -->
</div>
<!-- Circuit decorative element bottom -->
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
</div>
</main>
<!-- Footer -->
<footer class="py-md border-t border-outline-variant/30 mt-auto px-margin-mobile text-center">
<p class="font-label-sm text-label-sm text-[#9CA3AF] uppercase tracking-wider">
            Dúvidas? Entre em contato pelo nosso WhatsApp principal.
        </p>
</footer>
<script>
        // Simple subtle entrance animation
        document.addEventListener('DOMContentLoaded', () => {
            const mainContent = document.querySelector('main');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(20px)';
            
            requestAnimationFrame(() => {
                mainContent.style.transition = 'opacity 0.8s ease-out, transform 0.8s ease-out';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            });
        });
    </script>
